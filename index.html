<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>लूडो क्लासिक लाइट</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #0f172a; 
            color: #fff; 
            font-family: sans-serif;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            padding: 10px;
        }
        #game-container {
            width: 100%;
            max-width: 360px;
            background: #1e293b;
            padding: 10px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: #ffffff;
            border-radius: 8px;
        }
        .controls {
            margin-top: 15px;
            background: #0f172a;
            padding: 12px;
            border-radius: 8px;
        }
        .status {
            font-size: 16px;
            font-weight: bold;
            color: #38bdf8;
            margin-bottom: 10px;
        }
        .btn {
            background: #22c55e;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="ludoCanvas" width="450" height="450"></canvas>
        <div class="controls">
            <div class="status" id="status-text">🔴 लाल की बारी है</div>
            <button class="btn" id="roll-btn" onclick="rollDice()">🎲 पासा फेंकें</button>
        </div>
    </div>

    <script>
        // Telegram WebApp Initialize
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }

        const canvas = document.getElementById('ludoCanvas');
        const ctx = canvas.getContext('2d');
        const statusText = document.getElementById('status-text');
        const rollBtn = document.getElementById('roll-btn');

        const size = 30; // हर स्क्वायर का साइज (15 * 30 = 450)
        let turn = 0; // 0: Red, 1: Green, 2: Yellow, 3: Blue
        let diceValue = 0;
        const players = ['RED', 'GREEN', 'YELLOW', 'BLUE'];
        const colors = { RED: '#ef4444', GREEN: '#22c55e', YELLOW: '#eab308', BLUE: '#3b82f6' };
        const playerNames = { RED: '🔴 लाल', GREEN: '🟢 हरा', YELLOW: '🟡 पीला', BLUE: '🔵 नीला' };

        // गोटियों की शुरुआती पोजीशन (Home bases)
        let tokens = [
            { player: 'RED', x: 1.5, y: 1.5 }, { player: 'RED', x: 3.5, y: 1.5 },
            { player: 'GREEN', x: 10.5, y: 1.5 }, { player: 'GREEN', x: 12.5, y: 1.5 },
            { player: 'YELLOW', x: 10.5, y: 10.5 }, { player: 'YELLOW', x: 12.5, y: 10.5 },
            { player: 'BLUE', x: 1.5, y: 10.5 }, { player: 'BLUE', x: 3.5, y: 10.5 }
        ];

        function drawBoard() {
            ctx.clearRect(0, 0, 450, 450);

            // 1. पूरा ग्रिड (सफेद बैकग्राउंड और ग्रिड लाइन्स)
            ctx.strokeStyle = '#cbd5e1';
            ctx.lineWidth = 1;
            for (let r = 0; r < 15; r++) {
                for (let c = 0; c < 15; c++) {
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(c * size, r * size, size, size);
                    ctx.strokeRect(c * size, r * size, size, size);
                }
            }

            // 2. चारों होम बॉक्स (यार्ड्स)
            drawBox(0, 0, colors.RED);
            drawBox(9, 0, colors.GREEN);
            drawBox(9, 9, colors.YELLOW);
            drawBox(0, 9, colors.BLUE);

            // 3. होम पाथ (रंगीन रास्ते)
            for (let i = 1; i <= 5; i++) {
                ctx.fillStyle = colors.RED;    ctx.fillRect(i * size, 7 * size, size, size);
                ctx.fillStyle = colors.GREEN;  ctx.fillRect(7 * size, i * size, size, size);
                ctx.fillStyle = colors.YELLOW; ctx.fillRect((14 - i) * size, 7 * size, size, size);
                ctx.fillStyle = colors.BLUE;   ctx.fillRect(7 * size, (14 - i) * size, size, size);
            }

            // 4. सेंटर ट्रायंगल
            ctx.beginPath(); ctx.moveTo(6*size, 6*size); ctx.lineTo(7.5*size, 7.5*size); ctx.lineTo(6*size, 9*size); ctx.fillStyle = colors.RED; ctx.fill();
            ctx.beginPath(); ctx.moveTo(6*size, 6*size); ctx.lineTo(7.5*size, 7.5*size); ctx.lineTo(9*size, 6*size); ctx.fillStyle = colors.GREEN; ctx.fill();
            ctx.beginPath(); ctx.moveTo(9*size, 6*size); ctx.lineTo(7.5*size, 7.5*size); ctx.lineTo(9*size, 9*size); ctx.fillStyle = colors.YELLOW; ctx.fill();
            ctx.beginPath(); ctx.moveTo(6*size, 9*size); ctx.lineTo(7.5*size, 7.5*size); ctx.lineTo(9*size, 9*size); ctx.fillStyle = colors.BLUE; ctx.fill();
            
            // 5. गोटियां ड्रा करना
            tokens.forEach(t => {
                ctx.beginPath();
                ctx.arc(t.x * size, t.y * size, 11, 0, Math.PI * 2);
                ctx.fillStyle = colors[t.player];
                ctx.fill();
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2;
                ctx.stroke();
            });
        }

        function drawBox(x, y, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x * size, y * size, 6 * size, 6 * size);
            ctx.fillStyle = '#ffffff';
            ctx.fillRect((x + 1) * size, (y + 1) * size, 4 * size, 4 * size);
            ctx.strokeStyle = '#0f172a';
            ctx.strokeRect(x * size, y * size, 6 * size, 6 * size);
        }

        function rollDice() {
            rollBtn.disabled = true;
            let counter = 0;
            
            let anim = setInterval(() => {
                diceValue = Math.floor(Math.random() * 6) + 1;
                rollBtn.innerText = `🎲 ${diceValue}`;
                counter++;
                
                if (counter > 6) {
                    clearInterval(anim);
                    
                    // टर्न बदलने का बेसिक लॉजिक (पासा फेंकने के बाद अगला खिलाड़ी)
                    setTimeout(() => {
                        turn = (turn + 1) % 4;
                        statusText.innerText = `${playerNames[players[turn]]} की बारी है`;
                        rollBtn.disabled = false;
                        rollBtn.innerText = '🎲 पासा फेंकें';
                    }, 1000);
                }
            }, 80);
        }

        // गेम स्टार्ट करें
        drawBoard();
    </script>
</body>
</html>
