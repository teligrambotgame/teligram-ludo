<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>असली प्रीमियम लूडो</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #eef2f3; margin: 0; padding: 10px; user-select: none; }
        h1 { font-size: 20px; color: #2c3e50; margin: 5px 0; text-transform: uppercase; letter-spacing: 1px; }
        
        .game-wrapper { max-width: 360px; margin: 0 auto; background: white; padding: 10px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
        
        /* 15x15 लूडो ग्रिड */
        #board {
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            grid-template-rows: repeat(15, 1fr);
            width: 340px;
            height: 340px;
            margin: 10px auto;
            border: 4px solid #2c3e50;
            background-color: #fff;
            position: relative;
        }

        /* प्लेयर्स के घर */
        .house { grid-column: span 6; grid-row: span 6; display: flex; align-items: center; justify-content: center; border: 1px solid #2c3e50; box-sizing: border-box; }
        .red-h { background: #ff4d4d; } .green-h { background: #2ecc71; }
        .yellow-h { background: #f1c40f; } .blue-h { background: #3498db; }
        .inner-box { width: 65%; height: 65%; background: white; border-radius: 8px; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; padding: 6px; gap: 6px; box-sizing: border-box; }

        /* रास्ते के खाने */
        .cell { border: 0.5px solid #bdc3c7; box-sizing: border-box; display: flex; align-items: center; justify-content: center; position: relative; background: #fff; font-size: 9px; color: #ccc; }
        
        /* स्टॉप और खास खाने */
        .red-path { background: #ffb3b3; } .green-path { background: #b3ffcc; }
        .yellow-path { background: #fffae6; } .blue-path { background: #d9ecff; }
        .center-home { grid-column: span 3; grid-row: span 3; background: #2c3e50; border: 1px solid #2c3e50; box-sizing: border-box; position: relative; }

        /* गोटियाँ */
        .token {
            width: 18px; height: 18px; border-radius: 50%; border: 2px solid white;
            box-shadow: 0 3px 6px rgba(0,0,0,0.3); display: inline-block; cursor: pointer;
            transition: transform 0.1s ease; position: absolute; z-index: 100;
        }
        .token.active-turn { animation: bounce 0.5s infinite alternate; border-color: #000; }
        .red-t { background: #ff4d4d; } .green-t { background: #2ecc71; }
        .yellow-t { background: #f1c40f; } .blue-t { background: #3498db; }

        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.2); } }

        /* कंट्रोल्स */
        .controls { background: #f8f9fa; padding: 12px; border-radius: 12px; margin-top: 10px; border: 1px solid #e9ecef; }
        #status-bar { font-size: 15px; font-weight: bold; margin-bottom: 8px; color: #34495e; }
        #dice-trigger { font-size: 16px; padding: 10px 24px; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: background 0.2s; }
        .dice-display { font-size: 24px; margin-top: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>🏆 सुपर टेलीग्राम लूडो</h1>
    
    <div class="game-wrapper">
        <div id="board">
            <!-- घर (Houses) -->
            <div class="house red-h"><div class="inner-box" id="red-yard"></div></div>
            <!-- टॉप का रास्ता -->
            <div class="cell" id="idx-12"></div><div class="cell green-path" id="idx-13"></div><div class="cell" id="idx-14"></div>
            <div class="cell" id="idx-11"></div><div class="cell green-path" id="idx-52"></div><div class="cell green-path" id="idx-15"></div>
            <div class="cell" id="idx-10"></div><div class="cell green-path" id="idx-53"></div><div class="cell" id="idx-16"></div>
            <div class="cell" id="idx-9"></div><div class="cell green-path" id="idx-54"></div><div class="cell" id="idx-17"></div>
            <div class="cell" id="idx-8"></div><div class="cell green-path" id="idx-55"></div><div class="cell" id="idx-18"></div>
            <div class="cell" id="idx-7"></div><div class="cell green-path" id="idx-56"></div><div class="cell" id="idx-19"></div>
            
            <div class="house green-h"><div class="inner-box" id="green-yard"></div></div>

            <!-- लेफ्ट का रास्ता -->
            <div class="cell" id="idx-1"></div><div class="cell red-path" id="idx-2"></div><div class="cell" id="idx-3"></div><div class="cell" id="idx-4"></div><div class="cell" id="idx-5"></div><div class="cell" id="idx-6"></div>
            <div class="cell" id="idx-0"></div><div class="cell red-path" id="idx-48"></div><div class="cell red-path" id="idx-49"></div><div class="cell red-path" id="idx-50"></div><div class="cell red-path" id="idx-51"></div><div class="cell red-path" id="idx-57"></div>
            <div class="cell" id="idx-47"></div><div class="cell" id="idx-46"></div><div class="cell" id="idx-45"></div><div class="cell" id="idx-44"></div><div class="cell" id="idx-43"></div><div class="cell" id="idx-42"></div>

            <!-- सेंटर -->
            <div class="center-home" id="idx-home"></div>

            <!-- राइट का रास्ता -->
            <div class="cell" id="idx-20"></div><div class="cell" id="idx-21"></div><div class="cell" id="idx-22"></div><div class="cell" id="idx-23"></div><div class="cell" id="idx-24"></div><div class="cell" id="idx-25"></div>
            <div class="cell" id="idx-61"></div><div class="cell yellow-path" id="idx-60"></div><div class="cell yellow-path" id="idx-59"></div><div class="cell yellow-path" id="idx-58"></div><div class="cell yellow-path" id="idx-26"></div><div class="cell" id="idx-27"></div>
            <div class="cell" id="idx-33"></div><div class="cell" id="idx-32"></div><div class="cell" id="idx-31"></div><div class="cell" id="idx-30"></div><div class="cell yellow-path" id="idx-29"></div><div class="cell" id="idx-28"></div>

            <!-- बॉटम का रास्ता -->
            <div class="house blue-h"><div class="inner-box" id="blue-yard"></div></div>
            <div class="cell" id="idx-41"></div><div class="cell blue-path" id="idx-65"></div><div class="cell" id="idx-34"></div>
            <div class="cell" id="idx-40"></div><div class="cell blue-path" id="idx-64"></div><div class="cell" id="idx-35"></div>
            <div class="cell" id="idx-39"></div><div class="cell blue-path" id="idx-63"></div><div class="cell" id="idx-36"></div>
            <div class="cell" id="idx-38"></div><div class="cell blue-path" id="idx-62"></div><div class="cell" id="idx-37"></div>
            <div class="cell" id="idx-46"></div><div class="cell blue-path" id="idx-45"></div><div class="cell" id="idx-44"></div>
            <div class="cell" id="idx-47"></div><div class="cell blue-path" id="idx-44"></div><div class="cell" id="idx-43"></div>
            <div class="house yellow-h"><div class="inner-box" id="yellow-yard"></div></div>
        </div>

        <div class="controls">
            <div id="status-bar">🔴 लाल खिलाड़ी की बारी है</div>
            <button id="dice-trigger" onclick="rollLudoDice()" style="background: #ff4d4d;">🎲 पासा फेकें</button>
            <div class="dice-display">नंबर आया: <span id="roll-val">-</span></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // प्लेयर्स की पूरी सेटिंग
        const players = {
            'लाल': { color: 'red', start: 2, end: 0, homeStart: 48, btnColor: '#ff4d4d', emoji: '🔴' },
            'हरा': { color: 'green', start: 15, end: 13, homeStart: 52, btnColor: '#2ecc71', emoji: '🟢' },
            'पीला': { color: 'yellow', start: 28, end: 26, homeStart: 58, btnColor: '#f1c40f', emoji: '🟡' },
            'नीला': { color: 'blue', start: 41, end: 39, homeStart: 62, btnColor: '#3498db', emoji: '🔵' }
        };
        const turnOrder = ['लाल', 'हरा', 'पीला', 'नीला'];
        let currentTurnIdx = 0;
        let rolledValue = 0;
        let hasRolled = false;

        // गोटियों का डेटाबेस
        let tokensData = [
            { id: 'red-1', player: 'लाल', status: 'home', pos: -1 },
            { id: 'green-1', player: 'हरा', status: 'home', pos: -1 },
            { id: 'yellow-1', player: 'पीला', status: 'home', pos: -1 },
            { id: 'blue-1', player: 'नीला', status: 'home', pos: -1 }
        ];

        // बोर्ड को फ्रेश रेंडर करना
        function renderTokens() {
            // पहले पुरानी सब हटाओ
            document.querySelectorAll('.token').forEach(t => t.remove());

            tokensData.forEach(t => {
                const tokenEl = document.createElement('div');
                tokenEl.className = `token ${players[t.player].color}-t`;
                tokenEl.id = t.id;
                
                // अगर ये उस प्लेयर की गोटी है जिसकी बारी है और पासा चल चुका है, तो चमकाओ
                if(hasRolled && t.player === turnOrder[currentTurnIdx]) {
                    tokenEl.classList.add('active-turn');
                }

                tokenEl.onclick = () => handleTokenClick(t);

                if (t.status === 'home') {
                    document.getElementById(`${players[t.player].color}-yard`).appendChild(tokenEl);
                    tokenEl.style.position = 'relative';
                } else if (t.status === 'track' || t.status === 'innerPath') {
                    document.getElementById(`idx-${t.pos}`).appendChild(tokenEl);
                    tokenEl.style.position = 'absolute';
                    tokenEl.style.top = '5px'; tokenEl.style.left = '5px';
                } else if (t.status === 'won') {
                    document.getElementById('idx-home').appendChild(tokenEl);
                }
            });
        }

        // पासा फेंकना
        function rollLudoDice() {
            if (hasRolled) return; // जब तक गोटी न चले, दोबारा पासा नहीं

            rolledValue = Math.floor(Math.random() * 6) + 1;
            document.getElementById('roll-val').innerText = rolledValue;
            hasRolled = true;

            const currentPlayer = turnOrder[currentTurnIdx];
            const token = tokensData.find(t => t.player === currentPlayer);

            // ऑटो-चेक: क्या कोई चाल मुमकिन है?
            if (token.status === 'home' && rolledValue !== 6) {
                // घर में है और 6 नहीं आया -> बारी खत्म, अगले पर जाओ
                setTimeout(() => {
                    nextTurn();
                }, 1200);
                document.getElementById('status-bar').innerText = `🔒 6 नहीं आया! गोटी लॉक है।`;
                return;
            }
            
            document.getElementById('status-bar').innerText = `👉 अपनी गोटी पर क्लिक करके उसे चलाएं!`;
            renderTokens();
        }

        // गोटी पर क्लिक करने की लॉजिक
        function handleTokenClick(token) {
            if (!hasRolled) return;
            if (token.player !== turnOrder[currentTurnIdx]) return; // गलत गोटी छुई

            const pInfo = players[token.player];

            // 1. अगर घर में है और 6 आया है
            if (token.status === 'home' && rolledValue === 6) {
                token.status = 'track';
                token.pos = pInfo.start;
                finishMove();
                return;
            }

            // 2. अगर ट्रैक पर चल रही है
            if (token.status === 'track') {
                // यह एक सिंपल वॉक लॉजिक है जो गोटी को आगे बढ़ाएगी
                let newPos = token.pos + rolledValue;
                if(newPos > 47) newPos = newPos - 48; // ट्रैक लूप
                
                token.pos = newPos;
                
                // जीतने के पास पहुँचने पर होम पाथ (सिंपल चेक)
                if(token.pos === pInfo.end + 1) {
                    token.status = 'won';
                    document.getElementById('status-bar').innerText = `🏆 ${token.player} की गोटी जीत गई!`;
                }

                finishMove();
                return;
            }
        }

        function finishMove() {
            hasRolled = false;
            document.getElementById('roll-val').innerText = '-';
            nextTurn();
        }

        function nextTurn() {
            hasRolled = false;
            currentTurnIdx = (currentTurnIdx + 1) % 4;
            const nextPlayer = turnOrder[currentTurnIdx];
            const pInfo = players[nextPlayer];

            document.getElementById('status-bar').innerText = `${pInfo.emoji} ${nextPlayer} खिलाड़ी की बारी है`;
            
            const btn = document.getElementById('dice-trigger');
            btn.style.background = pInfo.btnColor;
            
            renderTokens();
        }

        // गेम लोड होते ही शुरू करें
        renderTokens();
    </script>
</body>
</html>
